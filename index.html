<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busca CEP & Endereços</title>

  <!-- CSS -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="css/materialize.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>

<body>

  <nav class="light-blue lighten-1">
    <div class="nav-wrapper container">
      <a class="brand-logo">Busca CEP</a>
    </div>
  </nav>

  <div class="container">
    <div class="row">

      <!-- TABS -->
      <div class="col s12">
        <ul class="tabs">
          <li class="tab col s4"><a class="active" href="#cep-tab">CEP</a></li>
          <li class="tab col s4"><a href="#rua-tab">RUA</a></li>
          <li class="tab col s4"><a href="#log-tab">LOG</a></li>
        </ul>
      </div>

      <!-- ===== ABA CEP ===== -->
      <div id="cep-tab" class="col s12">
        <h5 class="center">Buscar por CEP</h5>

        <div class="row center">

          <div class="input-field col s12 m6 l3">
            <input id="cep" type="text" onblur="buscarCEP()">
            <label for="cep">CEP</label>
          </div>

          <div class="input-field col s12 m6 l3">
            <input id="cidade" type="text" readonly>
            <label for="cidade">Cidade</label>
          </div>

          <div class="input-field col s12 m6 l3">
            <input id="bairro" type="text" readonly>
            <label for="bairro">Bairro</label>
          </div>

          <div class="input-field col s12 m6 l3">
            <input id="estado" type="text" readonly>
            <label for="estado">Estado</label>
          </div>

          <div class="input-field col s12 m6 l3">
            <input id="ddd" type="text" readonly>
            <label for="ddd">DDD</label>
          </div>

          <a onclick="buscarCEP()" class="btn-small">Buscar</a>
          <a onclick="limpar()" class="btn-small red">Limpar</a>

        </div>
      </div>

      <!-- ===== ABA RUA ===== -->
      <div id="rua-tab" class="col s12">
        <h5 class="center">Buscar por Rua</h5>

        <div class="row center">

          <div class="input-field col s12 m6 l3">
            <select id="lista-ufs" onchange="buscarCidades(this.value)">
              <option value="" disabled selected>Escolha um Estado</option>
            </select>
          </div>

          <div class="input-field col s12 m6 l3">
            <select id="lista-cidades">
              <option value="" disabled selected>Escolha uma Cidade</option>
            </select>
          </div>

          <div class="input-field col s12 m6 l3">
            <input id="rua" type="text"
              onkeypress="if(event.key==='Enter') buscarRua()">
            <label for="rua">Rua</label>
          </div>

          <a onclick="buscarRua()" class="btn-small">Buscar</a>
          <a onclick="limparRua()" class="btn-small red">Limpar</a>

        </div>

        <ul id="lista-ruas" class="collection"></ul>
      </div>

      <!-- ===== ABA LOG ===== -->
      <div id="log-tab" class="col s12">
        <h5 class="center">Logs</h5>
        <ul id="log-lista" class="collection"></ul>
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"></script>
  <script src="https://unpkg.com/imask"></script>
  <script src="js/materialize.js"></script>
  <script src="js/init.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
